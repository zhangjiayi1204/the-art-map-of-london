<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Explore London's art landmarks on an interactive map. Click each marker to see the artwork and discover its story.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Map — The Art Map of London</title>
  <link href="https://fonts.googleapis.com/css2?family=Italiana&family=Literata&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="music-player.css"">
  <link rel="stylesheet" href="map.css">
</head>
<body>
  <div id="navbar-placeholder"></div>
  <div class="map-wrapper">
    <div id="map"></div>
    <div class="custom-zoom">
      <button id="zoom-in" title="Zoom in">+</button>
      <button id="zoom-out" title="Zoom out">−</button>
    </div>
  </div>
  <div id="footer-placeholder"></div>

  <script src="i18n.js"></script>
  <script src="components.js"></script>
  <script src="music-player.js""></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="map.js"></script>
</body>
</html>
